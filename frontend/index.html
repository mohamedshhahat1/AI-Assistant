<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Assistant</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-blue: #2563eb;
            --primary-blue-hover: #1d4ed8;
            --dark-bg: #0f172a;
            --darker-bg: #020617;
            --card-bg: #1e293b;
            --card-bg-light: #334155;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --border-color: #334155;
            --success-green: #22c55e;
            --error-red: #ef4444;
            --gradient-start: #1e3a5f;
            --gradient-end: #0f172a;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, var(--gradient-start) 0%, var(--gradient-end) 100%);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Header */
        .header {
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-color);
            padding: 16px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
            z-index: 100;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-avatar {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, var(--primary-blue), #7c3aed);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
        }

        .header-info h1 {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-primary);
            line-height: 1.2;
        }

        .header-info .subtitle {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 2px;
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: var(--success-green);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: var(--success-green);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(0.85); }
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .clear-btn {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: var(--error-red);
            padding: 8px 14px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .clear-btn:hover {
            background: rgba(239, 68, 68, 0.2);
            border-color: rgba(239, 68, 68, 0.5);
            transform: translateY(-1px);
        }

        /* Chat Area */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            scroll-behavior: smooth;
        }

        .chat-container::-webkit-scrollbar {
            width: 6px;
        }

        .chat-container::-webkit-scrollbar-track {
            background: transparent;
        }

        .chat-container::-webkit-scrollbar-thumb {
            background: var(--card-bg-light);
            border-radius: 3px;
        }

        /* Empty State */
        .empty-state {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: var(--text-muted);
            gap: 12px;
        }

        .empty-state .icon {
            font-size: 48px;
            margin-bottom: 8px;
        }

        .empty-state h2 {
            font-size: 20px;
            color: var(--text-secondary);
            font-weight: 600;
        }

        .empty-state p {
            font-size: 14px;
            color: var(--text-muted);
        }

        /* Message Bubbles */
        .message {
            display: flex;
            gap: 10px;
            max-width: 75%;
            animation: messageIn 0.3s ease forwards;
            opacity: 0;
            transform: translateY(12px);
        }

        @keyframes messageIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .message.bot {
            align-self: flex-start;
        }

        .message-avatar {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            flex-shrink: 0;
            margin-top: 4px;
        }

        .message.bot .message-avatar {
            background: linear-gradient(135deg, var(--primary-blue), #7c3aed);
        }

        .message.user .message-avatar {
            background: var(--card-bg-light);
        }

        .message-content {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .message-bubble {
            padding: 12px 16px;
            border-radius: 16px;
            font-size: 14px;
            line-height: 1.5;
            word-wrap: break-word;
            white-space: pre-wrap;
        }

        .message.bot .message-bubble {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-bottom-left-radius: 4px;
            color: var(--text-primary);
        }

        .message.user .message-bubble {
            background: linear-gradient(135deg, var(--primary-blue), #1d4ed8);
            border-bottom-right-radius: 4px;
            color: #ffffff;
        }

        .message-time {
            font-size: 11px;
            color: var(--text-muted);
            padding: 0 4px;
        }

        .message.user .message-time {
            text-align: right;
        }

        .message.error .message-bubble {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: var(--error-red);
        }

        /* Typing Indicator */
        .typing-indicator {
            display: flex;
            gap: 10px;
            align-self: flex-start;
            max-width: 75%;
            animation: messageIn 0.3s ease forwards;
            opacity: 0;
            transform: translateY(12px);
        }

        .typing-bubble {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            border-bottom-left-radius: 4px;
            padding: 14px 18px;
            display: flex;
            gap: 5px;
            align-items: center;
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            background: var(--text-muted);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out;
        }

        .typing-dot:nth-child(1) { animation-delay: 0s; }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-8px); }
        }

        /* Input Area */
        .input-area {
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(12px);
            border-top: 1px solid var(--border-color);
            padding: 16px 24px;
            flex-shrink: 0;
        }

        .input-wrapper {
            display: flex;
            gap: 12px;
            align-items: center;
            max-width: 900px;
            margin: 0 auto;
        }

        .input-field {
            flex: 1;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 14px 18px;
            color: var(--text-primary);
            font-size: 14px;
            outline: none;
            transition: all 0.2s ease;
        }

        .input-field:focus {
            border-color: var(--primary-blue);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
        }

        .input-field::placeholder {
            color: var(--text-muted);
        }

        .input-field:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .send-btn {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, var(--primary-blue), #1d4ed8);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            flex-shrink: 0;
        }

        .send-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.4);
        }

        .send-btn:active:not(:disabled) {
            transform: translateY(0);
        }

        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .char-counter {
            font-size: 11px;
            color: var(--text-muted);
            text-align: right;
            margin-top: 6px;
            max-width: 900px;
            margin-left: auto;
            margin-right: auto;
        }

        /* Footer */
        .footer {
            text-align: center;
            padding: 8px;
            font-size: 11px;
            color: var(--text-muted);
            flex-shrink: 0;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header {
                padding: 12px 16px;
            }

            .header-info h1 {
                font-size: 16px;
            }

            .header-info .subtitle {
                display: none;
            }

            .chat-container {
                padding: 16px;
                gap: 12px;
            }

            .message {
                max-width: 88%;
            }

            .input-area {
                padding: 12px 16px;
            }

            .input-field {
                padding: 12px 14px;
            }

            .clear-btn span {
                display: none;
            }
        }

        @media (max-width: 480px) {
            .message-avatar {
                width: 28px;
                height: 28px;
                font-size: 13px;
            }

            .message-bubble {
                padding: 10px 14px;
                font-size: 13px;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <div class="header">
        <div class="header-left">
            <div class="header-avatar">🤖</div>
            <div class="header-info">
                <h1>🤖 AI Assistant</h1>
                <div class="subtitle">Intelligent &bull; Contextual &bull; Memory-Powered</div>
            </div>
        </div>
        <div class="header-right">
            <div class="status-indicator">
                <div class="status-dot"></div>
                <span>Online</span>
            </div>
            <button class="clear-btn" onclick="clearChat()" title="Clear conversation">
                🗑️ <span>Clear</span>
            </button>
        </div>
    </div>

    <!-- Chat Messages -->
    <div class="chat-container" id="chatContainer">
        <div class="empty-state" id="emptyState">
            <div class="icon">💬</div>
            <h2>Start a conversation! Say hello 👋</h2>
            <p>Your AI assistant is ready to help with anything.</p>
        </div>
    </div>

    <!-- Input Area -->
    <div class="input-area">
        <div class="input-wrapper">
            <input
                type="text"
                class="input-field"
                id="messageInput"
                placeholder="Type your message..."
                maxlength="2000"
                autocomplete="off"
            >
            <button class="send-btn" id="sendBtn" onclick="sendMessage()" title="Send message">
                ▶
            </button>
        </div>
        <div class="char-counter" id="charCounter">0 / 2000</div>
    </div>

    <!-- Footer -->
    <div class="footer">Powered by AI Engine</div>

    <script>
        // Generate or retrieve persistent user ID
        function getUserId() {
            let userId = localStorage.getItem('ai_assistant_user_id');
            if (!userId) {
                userId = 'user_' + Math.random().toString(36).substring(2, 15) + Date.now().toString(36);
                localStorage.setItem('ai_assistant_user_id', userId);
            }
            return userId;
        }

        const userId = getUserId();
        const chatContainer = document.getElementById('chatContainer');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const emptyState = document.getElementById('emptyState');
        const charCounter = document.getElementById('charCounter');
        let isWaiting = false;

        // Character counter
        messageInput.addEventListener('input', () => {
            const len = messageInput.value.length;
            charCounter.textContent = `${len} / 2000`;
        });

        // Send on Enter key
        messageInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey && !isWaiting) {
                e.preventDefault();
                sendMessage();
            }
        });

        // Format timestamp
        function getTimestamp() {
            const now = new Date();
            return now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }

        // Hide empty state
        function hideEmptyState() {
            if (emptyState) {
                emptyState.style.display = 'none';
            }
        }

        // Add message to chat
        function addMessage(text, type) {
            hideEmptyState();
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${type}`;

            const avatar = type === 'bot' ? '🤖' : '👤';
            const avatarClass = 'message-avatar';

            messageDiv.innerHTML = `
                <div class="${avatarClass}">${avatar}</div>
                <div class="message-content">
                    <div class="message-bubble">${escapeHtml(text)}</div>
                    <div class="message-time">${getTimestamp()}</div>
                </div>
            `;

            chatContainer.appendChild(messageDiv);
            scrollToBottom();
        }

        // Add error message
        function addErrorMessage(text) {
            hideEmptyState();
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message bot error';

            messageDiv.innerHTML = `
                <div class="message-avatar">⚠️</div>
                <div class="message-content">
                    <div class="message-bubble">${escapeHtml(text)}</div>
                    <div class="message-time">${getTimestamp()}</div>
                </div>
            `;

            chatContainer.appendChild(messageDiv);
            scrollToBottom();
        }

        // Show typing indicator
        function showTypingIndicator() {
            const typingDiv = document.createElement('div');
            typingDiv.className = 'typing-indicator';
            typingDiv.id = 'typingIndicator';

            typingDiv.innerHTML = `
                <div class="message-avatar" style="background: linear-gradient(135deg, var(--primary-blue), #7c3aed);">🤖</div>
                <div class="typing-bubble">
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                </div>
            `;

            chatContainer.appendChild(typingDiv);
            scrollToBottom();
        }

        // Remove typing indicator
        function removeTypingIndicator() {
            const indicator = document.getElementById('typingIndicator');
            if (indicator) {
                indicator.remove();
            }
        }

        // Scroll to bottom
        function scrollToBottom() {
            requestAnimationFrame(() => {
                chatContainer.scrollTop = chatContainer.scrollHeight;
            });
        }

        // Escape HTML to prevent XSS
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Set input disabled state
        function setInputState(disabled) {
            isWaiting = disabled;
            messageInput.disabled = disabled;
            sendBtn.disabled = disabled;
            if (!disabled) {
                messageInput.focus();
            }
        }

        // Send message
        async function sendMessage() {
            const message = messageInput.value.trim();
            if (!message || isWaiting) return;

            // Add user message
            addMessage(message, 'user');
            messageInput.value = '';
            charCounter.textContent = '0 / 2000';

            // Disable input and show typing
            setInputState(true);
            showTypingIndicator();

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        user_id: userId,
                        message: message
                    })
                });

                removeTypingIndicator();

                if (!response.ok) {
                    throw new Error(`Server error: ${response.status}`);
                }

                const data = await response.json();
                const botReply = data.response || data.reply || data.message || 'No response received.';
                addMessage(botReply, 'bot');

            } catch (error) {
                removeTypingIndicator();
                addErrorMessage(`Something went wrong: ${error.message}. Please try again.`);
            } finally {
                setInputState(false);
            }
        }

        // Clear chat
        async function clearChat() {
            if (!confirm('Clear conversation and memory?')) return;

            try {
                await fetch(`/memory/${userId}`, {
                    method: 'DELETE'
                });
            } catch (error) {
                // Continue clearing UI even if API fails
                console.warn('Failed to clear server memory:', error);
            }

            // Clear UI
            chatContainer.innerHTML = '';
            const newEmptyState = document.createElement('div');
            newEmptyState.className = 'empty-state';
            newEmptyState.id = 'emptyState';
            newEmptyState.innerHTML = `
                <div class="icon">💬</div>
                <h2>Start a conversation! Say hello 👋</h2>
                <p>Your AI assistant is ready to help with anything.</p>
            `;
            chatContainer.appendChild(newEmptyState);
        }

        // Focus input on load
        messageInput.focus();
    </script>
</body>
</html>
